name: Build Kitab GUI

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Download & Extract OCR Binaries (Windows)
      if: matrix.os == 'windows-latest'
      shell: bash
      run: |
        mkdir -p bin
        # Download Tesseract InnoSetup installer and extract via 7z
        curl -L -o tesseract.exe https://digi.bib.uni-mannheim.de/tesseract/tesseract-ocr-w64-setup-5.3.3.20231005.exe
        7z x tesseract.exe -obin/tesseract
        
        # Download Ghostscript NSIS installer and extract via 7z
        curl -L -o gs.exe https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/gs10031/gs10031w64.exe
        7z x gs.exe -obin/ghostscript
        
        # Download required language data for Tesseract
        mkdir -p bin/tesseract/tessdata
        curl -L -o bin/tesseract/tessdata/aze_cyrl.traineddata https://github.com/tesseract-ocr/tessdata/raw/main/aze_cyrl.traineddata
        curl -L -o bin/tesseract/tessdata/aze.traineddata https://github.com/tesseract-ocr/tessdata/raw/main/aze.traineddata
        curl -L -o bin/tesseract/tessdata/rus.traineddata https://github.com/tesseract-ocr/tessdata/raw/main/rus.traineddata
        curl -L -o bin/tesseract/tessdata/eng.traineddata https://github.com/tesseract-ocr/tessdata/raw/main/eng.traineddata
        curl -L -o bin/tesseract/tessdata/osd.traineddata https://github.com/tesseract-ocr/tessdata/raw/main/osd.traineddata

    - name: Build with PyInstaller (Windows)
      if: matrix.os == 'windows-latest'
      run: pyinstaller --noconsole --onefile --add-data "bin;bin" kitab_gui.py
      
    - name: Build with PyInstaller (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: pyinstaller --noconsole --onefile kitab_gui.py
      
    - name: Rename executable (Windows)
      if: matrix.os == 'windows-latest'
      run: move dist\kitab_gui.exe dist\Kitab-Windows.exe
      shell: cmd
      
    - name: Rename executable (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: mv dist/kitab_gui dist/Kitab-Linux
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kitab-${{ matrix.os }}
        path: |
          dist/Kitab-Windows.exe
          dist/Kitab-Linux
          
    - name: Upload Release Asset
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/Kitab-Windows.exe
          dist/Kitab-Linux
